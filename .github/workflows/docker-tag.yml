name: docker-build-tag

on:
  push:
    tags:
      - "*"

jobs:
  docker-tag:
    if: ${{ github.actor != 'dependabot[bot]' }}
    uses: ./.github/workflows/docker-build-image.yml
    permissions:
      contents: write
      packages: write
      pull-requests: write
      statuses: write
    with:
      registry_push: true
      run_tests: false
      target_branch: ${{ github.head_ref }}
    secrets:
      DOCKERHUB_USER: ${{ secrets.DOCKER_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKER_TOKEN }}
