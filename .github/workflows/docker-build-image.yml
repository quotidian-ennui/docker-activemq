name: docker-build-image

on:
  workflow_call:
    inputs:
      registry_push:
        required: false
        default: false
        description: "Whether to push to docker registries"
        type: boolean
      run_tests:
        required: false
        default: true
        description: "Whether to try and test images (default true)"
        type: boolean
      target_branch:
        required: true
        description: "The branch to checkout and work-on"
        type: string
      sha:
        required: false
        description: "The sha for the commit status"
        type: string
      pull_request:
        required: false
        description: "The pull request"
        type: string
    secrets:
      DOCKERHUB_USER:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.dockerfiles.outputs.matrix}}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.target_branch }}
          persist-credentials: false
      - name: Find Dockerfiles
        id: dockerfiles
        shell: bash
        run: |-

          build_matrix() {
            mapfile dockerfiles < <(find . -type f -name "Dockerfile")
            for dockerfile in "${dockerfiles[@]}"; do
              docker_target="$(basename "$(dirname "$dockerfile")")"
              docker_tag_suffix="-$docker_target"
              docker_platform="linux/amd64,linux/arm64"
              docker_test_platform="linux/amd64"
              case "$docker_target" in
              temurin)
                docker_tag_suffix=""
                ;;
              msopenjdk)
                docker_platform="linux/amd64"
                ;;
              *)
                ;;
              esac
              {
                printf  '{ "docker_target": "%s", "docker_tag_suffix": "%s", "docker_platform": "%s", "docker_test_platform": "%s"}' \
                    "$docker_target" "$docker_tag_suffix" "$docker_platform" "$docker_test_platform"
              } | jq '.'
            done | jq --slurp '{"include": .}'
          }
          eof=$(head -c15 /dev/urandom | base64)
          {
            printf "matrix<<%s\n" "${eof}";
            build_matrix
            printf "%s\n" "${eof}";
          } >> "$GITHUB_OUTPUT"

  docker-build-image:
    name: Build ${{ matrix.docker_target }}
    runs-on: ubuntu-latest
    needs:
      - matrix-setup
    permissions:
      contents: write
      packages: write
      pull-requests: write
      statuses: write
    if: |
      inputs.registry_push == true
    strategy:
      matrix: ${{ fromJSON(needs.matrix-setup.outputs.matrix) }}

    steps:
      - name: step-security/harden-runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.target_branch }}
          persist-credentials: false
      - name: Build Docker Image
        id: docker_build
        uses: quotidian-ennui/actions-olio/docker-image-builder@83871db203c510c8c8d65292f24ebf5437728e7c # v0.9.1
        with:
          registry_push: ${{ inputs.registry_push }}
          dockerfile: ${{ matrix.docker_target }}/Dockerfile
          image_tag_suffix: ${{ matrix.docker_tag_suffix }}
          image_platforms: ${{ matrix.docker_platform }}
          ghcr_image_name: ghcr.io/${{ github.repository }}
          dockerhub_image_name: lewinc/activemq
          ghcr_user: ${{ github.repository_owner }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
          dockerhub_user: ${{ secrets.DOCKERHUB_USER }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

  # Separate job for testing the image because we can't load_locally if we build an arm64 image
  docker-test-image:
    name: Test ${{ matrix.docker_target }}
    runs-on: ubuntu-latest
    needs:
      - matrix-setup
    if: |
      inputs.run_tests == true
    permissions:
      contents: read
      packages: read
      pull-requests: write
      statuses: write
    strategy:
      matrix: ${{ fromJSON(needs.matrix-setup.outputs.matrix) }}
    steps:
      - name: Set commit status to pending
        uses: quotidian-ennui/actions-olio/commit-status-and-label@83871db203c510c8c8d65292f24ebf5437728e7c # v0.9.1
        if: |
          inputs.sha != ''
        with:
          sha: ${{ inputs.sha }}
          pull_request: ${{ inputs.pull_request }}
          label_prefix: "docker (${{ matrix.docker_target }}): "
          state: pending
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.target_branch }}
          persist-credentials: false
      - name: Build Docker Image
        id: docker_build
        uses: quotidian-ennui/actions-olio/docker-image-builder@83871db203c510c8c8d65292f24ebf5437728e7c # v0.9.1
        with:
          registry_push: false
          load_locally: true
          dockerfile: ${{ matrix.docker_target }}/Dockerfile
          image_tag_suffix: ${{ matrix.docker_tag_suffix }}
          image_platforms: ${{ matrix.docker_test_platform }}
          dockerhub_image_name: ${{ github.repository_owner }}/activemq-test
      - name: ActiveMQ Version
        id: docker_test
        env:
          DOCKER_TAGS: ${{ steps.docker_build.outputs.image_tags }}
        run: |
          test_image=$(echo "$DOCKER_TAGS" | head -n 1 | cut -d' ' -f1)
          docker run --rm --entrypoint=bash "$test_image" bin/activemq --version
      - name: Cleanup
        # Our work here is done, so cleanup
        id: cleanup
        if: success() || failure()
        continue-on-error: true
        env:
          DOCKER_TAGS: ${{ steps.docker_build.outputs.image_tags }}
        run: |
          for image in "$DOCKER_TAGS"; do
            docker rmi "$image" || true
          done
      - name: set commit status
        uses: quotidian-ennui/actions-olio/commit-status-and-label@83871db203c510c8c8d65292f24ebf5437728e7c # v0.9.1
        if: |
          (success() || failure()) &&  inputs.sha != ''
        with:
          sha: ${{ inputs.sha }}
          pull_request: ${{ inputs.pull_request }}
          label_prefix: "docker (${{ matrix.docker_target }}): "
          state: ${{ steps.docker_test.outcome || steps.docker_build.outcome }}
